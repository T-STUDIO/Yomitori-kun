<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レシートスキャナー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        video { width: 100%; max-width: 400px; border-radius: 12px; border: 2px solid #333; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; background: #007bff; color: white; }
        .result { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>レシート読み取り</h1>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div>
        <button onclick="startCamera()">カメラ起動</button>
        <button id="captureBtn" onclick="captureAndOCR()">撮影して解析</button>
    </div>

    <div id="resultArea" class="result" style="display:none;">
        <p>抽出された金額: <strong id="amountText"></strong></p>
        <button onclick="sendToSheet()" style="background: #28a745;">スプレッドシートに保存</button>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let currentAmount = "";

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
        }

        async function captureAndOCR() {
            const btn = document.getElementById('captureBtn');
            btn.innerText = "解析中...";
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            const apiKey = 'AIzaSyDiuqCD3XPpI-yPogWDafmrQz-qKaVNZTo'; // ここにキーを入れてください
            const response = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${apiKey}`, {
                method: 'POST',
                body: JSON.stringify({
                    requests: [{ image: { content: base64Image }, features: [{ type: 'TEXT_DETECTION' }] }]
                })
            });

            const result = await response.json();
            const fullText = result.responses[0]?.fullTextAnnotation?.text || "";
            const match = fullText.match(/(合計|小計|Total)\D*(\d{1,3}(,\d{3})*)/i);
            
            if (match) {
                currentAmount = match[2].replace(/,/g, '');
                document.getElementById('amountText').innerText = "¥" + currentAmount;
                document.getElementById('resultArea').style.display = 'block';
            } else {
                alert("金額が見つかりませんでした。");
            }
            btn.innerText = "撮影して解析";
        }

        async function sendToSheet() {
            const gasUrl = 'https://script.google.com/macros/s/AKfycbyRGehpTbjAAjbnzGe9jhcQzY9YiOZLk_NFgNuQY4bZAZUxQakJfj-EAvMQ2a-8q-J_dQ/exec'; // ここにGASのURLを入れてください
            await fetch(gasUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ amount: parseInt(currentAmount) })
            });
            alert("送信完了！");
            document.getElementById('resultArea').style.display = 'none';
        }
    </script>
</body>
</html>
